version: "3.8"

services:
  mongodb:
    image: mongo:6
    container_name: subscription_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: subscription_billing
    volumes:
      - mongodb_data:/data/db
    networks:
      - app_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: subscription_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/subscription_billing
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./logs:/usr/src/app/logs
    networks:
      - app_network

volumes:
  mongodb_data:

networks:
  app_network:
    driver: bridge
